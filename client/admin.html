<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equity Sprint — Game Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FBF8F2; --white: #FFFDF9; --blue: #4A90E2; --blue-light: #EBF3FC;
      --green: #7ED321; --red: #D0021B; --gold: #F5A623; --gold-b: #D4890A;
      --coral: #FF6B6B; --mint: #52C9A0; --text: #2D2D2D; --text2: #6B6B6B;
      --text3: #AAAAAA; --border: #E8E4D9;
      --shadow: 0 4px 16px rgba(0,0,0,0.07); --radius: 16px; --radius-sm: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

    .header { background: #1a2744; color: #fff; padding: 18px 32px; display: flex; align-items: center; gap: 16px; }
    .header h1 { font-size: 1.3rem; font-weight: 900; }
    .header .badge { background: var(--gold); color: #fff; font-size: .65rem; font-weight: 800; padding: 2px 8px; border-radius: 6px; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

    .card { background: var(--white); border: 2px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
    .card-title { font-size: 1rem; font-weight: 800; margin-bottom: 12px; color: var(--blue); }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-box { background: var(--white); border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 14px; text-align: center; }
    .stat-value { font-size: 1.6rem; font-weight: 900; color: var(--blue); }
    .stat-label { font-size: .7rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

    .bar-chart { margin: 8px 0; }
    .bar-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .bar-label { font-size: .72rem; font-weight: 700; color: var(--text2); min-width: 90px; text-align: right; }
    .bar-track { flex: 1; background: var(--border); border-radius: 4px; height: 16px; overflow: hidden; position: relative; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; }
    .bar-count { font-size: .6rem; font-weight: 800; color: #fff; }

    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    th { text-align: left; font-weight: 800; color: var(--text2); font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; padding: 8px 10px; border-bottom: 2px solid var(--border); }
    td { padding: 10px; border-bottom: 1px solid var(--border); }
    tr.clickable { cursor: pointer; transition: background .1s; }
    tr.clickable:hover { background: var(--blue-light); }
    tr.selected { background: var(--blue-light); }

    .detail-panel { margin-top: 16px; }
    .nw-chart { margin: 12px 0; }
    .nw-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .nw-year { font-size: .7rem; font-weight: 700; color: var(--text2); min-width: 40px; }
    .nw-bars { flex: 1; display: flex; gap: 2px; }
    .nw-bar { height: 14px; border-radius: 3px; transition: width .4s ease; position: relative; }
    .nw-bar:hover::after { content: attr(data-tip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #333; color: #fff; font-size: .6rem; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }

    .action-log { max-height: 400px; overflow-y: auto; font-size: .78rem; }
    .action-entry { padding: 6px 10px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: baseline; }
    .action-year { font-weight: 800; color: var(--blue); min-width: 36px; }
    .action-player { font-weight: 700; min-width: 80px; }
    .action-type { font-weight: 800; color: var(--gold-b); min-width: 80px; }
    .action-detail { color: var(--text2); }
    .bot-tag { font-size: .6rem; background: var(--border); color: var(--text2); padding: 1px 4px; border-radius: 3px; }

    .spin-list { max-height: 300px; overflow-y: auto; }
    .spin-entry { padding: 6px 10px; border-bottom: 1px solid var(--border); font-size: .78rem; display: flex; gap: 8px; }
    .spin-cat { font-weight: 800; padding: 1px 6px; border-radius: 4px; font-size: .68rem; }
    .spin-cat.economicEvent { background: #FDECEA; color: var(--red); }
    .spin-cat.marketChange { background: #EBF3FC; color: var(--blue); }
    .spin-cat.marketInfluence { background: #F5EEF8; color: #9B59B6; }
    .spin-cat.chance { background: #FEF6E6; color: var(--gold-b); }

    .empty { color: var(--text3); font-style: italic; padding: 20px; text-align: center; }
    .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
    .tab-btn { padding: 6px 14px; border-radius: 8px; font-weight: 700; font-size: .78rem; background: transparent; color: var(--text2); cursor: pointer; border: none; }
    .tab-btn.active { background: var(--blue); color: #fff; }
    .player-colors { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; }
  </style>
</head>
<body>

<div class="header">
  <h1>Equity Sprint Analytics</h1>
  <span class="badge">ADMIN</span>
</div>

<div class="container">
  <div id="stats-section"></div>
  <div class="card">
    <div class="card-title">Completed Games</div>
    <div id="game-list"><div class="empty">Loading...</div></div>
  </div>
  <div id="game-detail" class="card" style="display:none;">
    <div class="card-title" id="detail-title">Game Detail</div>
    <div class="tabs" id="detail-tabs">
      <button class="tab-btn active" data-tab="nw">Net Worth</button>
      <button class="tab-btn" data-tab="actions">Actions</button>
      <button class="tab-btn" data-tab="spins">Wheel Spins</button>
    </div>
    <div id="detail-content"></div>
  </div>
</div>

<script>
const PLAYER_COLORS = ['#4A90E2', '#7ED321', '#D0021B', '#F5A623'];
const fmt = n => '$' + Math.round(n || 0).toLocaleString('en-AU');

let currentTab = 'nw';
let currentGame = null;

async function init() {
  const [summary, games] = await Promise.all([
    fetch('/api/games/summary').then(r => r.json()).catch(() => ({ totalGames: 0 })),
    fetch('/api/games').then(r => r.json()).catch(() => []),
  ]);
  renderStats(summary);
  renderGameList(games);
}

function renderStats(s) {
  if (!s || s.totalGames === 0) {
    document.getElementById('stats-section').innerHTML = '<div class="card"><div class="empty">No games recorded yet. Play a game to see analytics here.</div></div>';
    return;
  }
  const actionKeys = Object.keys(s.actionFrequency || {});
  const maxAction = Math.max(...Object.values(s.actionFrequency || {}), 1);
  const actionColors = { buy: '#4A90E2', sell: '#D0021B', renovate: '#F5A623', develop: '#52C9A0', reduceDebt: '#9B59B6', releaseEquity: '#7ED321', endSlot: '#AAAAAA', playInfluence: '#FF6B6B', setManager: '#6B6B6B' };

  const barsHtml = actionKeys.sort((a,b) => (s.actionFrequency[b]||0) - (s.actionFrequency[a]||0)).map(k => {
    const v = s.actionFrequency[k]; const pct = Math.round((v / maxAction) * 100);
    return `<div class="bar-item"><div class="bar-label">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${actionColors[k]||'#999'}"><span class="bar-count">${v}</span></div></div></div>`;
  }).join('');

  const tierKeys = Object.keys(s.propertyTiersPurchased || {});
  const maxTier = Math.max(...Object.values(s.propertyTiersPurchased || {}), 1);
  const tierColors = { standard: '#4A90E2', premium: '#9B59B6', rare: '#F5A623', legendary: '#FF6B6B' };
  const tierBars = tierKeys.map(k => {
    const v = s.propertyTiersPurchased[k]; const pct = Math.round((v / maxTier) * 100);
    return `<div class="bar-item"><div class="bar-label">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${tierColors[k]||'#999'}"><span class="bar-count">${v}</span></div></div></div>`;
  }).join('');

  document.getElementById('stats-section').innerHTML = `
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-value">${s.totalGames}</div><div class="stat-label">Games Played</div></div>
      <div class="stat-box"><div class="stat-value">${s.humanWins}</div><div class="stat-label">Human Wins</div></div>
      <div class="stat-box"><div class="stat-value">${s.botWins}</div><div class="stat-label">Bot Wins</div></div>
      <div class="stat-box"><div class="stat-value">${s.averageGameLength}</div><div class="stat-label">Avg Years</div></div>
      <div class="stat-box"><div class="stat-value">${fmt(s.averageWinnerNetWorth)}</div><div class="stat-label">Avg Winner NW</div></div>
      <div class="stat-box"><div class="stat-value">${s.averagePropertiesAtGameEnd}</div><div class="stat-label">Avg Props / Player</div></div>
      <div class="stat-box"><div class="stat-value">${s.winsByNetWorthTarget}</div><div class="stat-label">Won by Target</div></div>
      <div class="stat-box"><div class="stat-value">${s.winsByMaxYears}</div><div class="stat-label">Won by Time</div></div>
    </div>
    <div class="card">
      <div class="card-title">Action Frequency</div>
      <div class="bar-chart">${barsHtml || '<div class="empty">No actions recorded</div>'}</div>
    </div>
    <div class="card">
      <div class="card-title">Property Tiers Purchased</div>
      <div class="bar-chart">${tierBars || '<div class="empty">No purchases recorded</div>'}</div>
    </div>
  `;
}

function renderGameList(games) {
  if (!games || games.length === 0) {
    document.getElementById('game-list').innerHTML = '<div class="empty">No games recorded yet.</div>';
    return;
  }
  const rows = games.slice().reverse().map(g => {
    const date = g.endedAt ? new Date(g.endedAt).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : '?';
    const players = (g.playerNames || []).map((n,i) => (g.botCount > 0 && i >= g.playerCount - g.botCount) ? n + ' \ud83e\udd16' : n).join(', ');
    return `<tr class="clickable" data-id="${g.gameId}">
      <td>${date}</td><td>${players}</td><td><strong>${g.winnerName || '?'}</strong></td>
      <td>${g.winCondition === 'netWorthTarget' ? '\ud83c\udfc6 Target' : '\u23f0 Time'}</td>
      <td>Yr ${g.yearReached || '?'}</td><td>${g.gameId}</td>
    </tr>`;
  }).join('');
  document.getElementById('game-list').innerHTML = `<table><thead><tr><th>Date</th><th>Players</th><th>Winner</th><th>Win</th><th>Year</th><th>ID</th></tr></thead><tbody>${rows}</tbody></table>`;

  document.querySelectorAll('tr.clickable').forEach(row => {
    row.addEventListener('click', () => loadGameDetail(row.dataset.id));
  });
}

async function loadGameDetail(gameId) {
  document.querySelectorAll('tr.clickable').forEach(r => r.classList.remove('selected'));
  document.querySelector(`tr[data-id="${gameId}"]`)?.classList.add('selected');

  try {
    currentGame = await fetch(`/api/games/${gameId}`).then(r => r.json());
    document.getElementById('detail-title').textContent = `Game ${gameId} — ${currentGame.winner?.name || 'Unknown'} won in Year ${currentGame.yearReached}`;
    document.getElementById('game-detail').style.display = '';
    currentTab = 'nw';
    updateTabs();
    renderDetail();
  } catch (err) {
    document.getElementById('detail-content').innerHTML = '<div class="empty">Failed to load game data.</div>';
  }
}

function updateTabs() {
  document.querySelectorAll('#detail-tabs .tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === currentTab);
  });
}

document.getElementById('detail-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  currentTab = btn.dataset.tab;
  updateTabs();
  renderDetail();
});

function renderDetail() {
  if (!currentGame) return;
  const el = document.getElementById('detail-content');
  switch (currentTab) {
    case 'nw': el.innerHTML = renderNetWorthChart(); break;
    case 'actions': el.innerHTML = renderActionLog(); break;
    case 'spins': el.innerHTML = renderSpinLog(); break;
  }
}

function renderNetWorthChart() {
  const g = currentGame;
  if (!g.yearSnapshots || g.yearSnapshots.length === 0) return '<div class="empty">No year-end snapshots available.</div>';
  const players = g.players || [];
  const maxNW = Math.max(...g.yearSnapshots.flatMap(s => s.players.map(p => p.netWorth)), 1);

  const legend = players.map((p, i) => `<span><span class="player-colors" style="background:${PLAYER_COLORS[i]}"></span>${p.name}${p.isBot ? ' \ud83e\udd16' : ''}</span>`).join(' &nbsp; ');

  const rows = g.yearSnapshots.map(snap => {
    const bars = snap.players.map((p, i) => {
      const pct = Math.max(1, Math.round((p.netWorth / maxNW) * 100));
      return `<div class="nw-bar" style="width:${pct}%;background:${PLAYER_COLORS[i]}" data-tip="${p.name}: ${fmt(p.netWorth)}"></div>`;
    }).join('');
    return `<div class="nw-row"><div class="nw-year">Yr ${snap.year}</div><div class="nw-bars">${bars}</div></div>`;
  }).join('');

  return `<div style="font-size:.78rem;margin-bottom:8px;">${legend}</div><div class="nw-chart">${rows}</div>`;
}

function renderActionLog() {
  const g = currentGame;
  if (!g.actions || g.actions.length === 0) return '<div class="empty">No actions recorded.</div>';
  const entries = g.actions.map(a => {
    const detailStr = a.details ? Object.entries(a.details).filter(([k,v]) => v != null).map(([k,v]) => `${k}: ${typeof v === 'number' && v > 999 ? fmt(v) : v}`).join(', ') : '';
    return `<div class="action-entry">
      <span class="action-year">Yr${a.year}</span>
      <span class="action-player">${a.playerName || '?'}${a.isBot ? ' <span class="bot-tag">BOT</span>' : ''}</span>
      <span class="action-type">${a.action}</span>
      <span class="action-detail">${detailStr}</span>
    </div>`;
  }).join('');
  return `<div class="action-log">${entries}</div>`;
}

function renderSpinLog() {
  const g = currentGame;
  if (!g.wheelSpins || g.wheelSpins.length === 0) return '<div class="empty">No wheel spins recorded.</div>';
  const entries = g.wheelSpins.map(s => {
    return `<div class="spin-entry">
      <span class="action-year">Yr${s.year}</span>
      <span class="action-player">${s.spinnerName || '?'}${s.isBot ? ' <span class="bot-tag">BOT</span>' : ''}</span>
      <span class="spin-cat ${s.category}">${s.category}</span>
      <span>${s.cardTitle}</span>
    </div>`;
  }).join('');
  return `<div class="spin-list">${entries}</div>`;
}

init();
</script>
</body>
</html>
